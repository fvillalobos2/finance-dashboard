<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Dashboard</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;max-width:960px;margin:0 auto;padding:24px;color:#1a1a19;background:#fcfcfb;line-height:1.6}
  h1{font-size:24px;font-weight:600;margin:0 0 4px}h2{font-size:18px;font-weight:600;margin:28px 0 12px}
  .sub{color:#6b6a64;font-size:14px;margin:0 0 20px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:8px}
  .card{background:#f1efe8;border-radius:10px;padding:14px 16px}
  .card .l{font-size:13px;color:#6b6a64;margin-bottom:4px}.card .v{font-size:26px;font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:14px}
  td,th{padding:7px 4px;border-bottom:.5px solid #e1e0d9;text-align:left}th{color:#6b6a64;font-weight:500}
  .chartbox{position:relative;width:100%;margin:8px 0 4px}
  .foot{font-size:12px;color:#898781;margin-top:28px;border-top:.5px solid #e1e0d9;padding-top:14px}
  ul{padding:0;margin:0}
  li{padding:10px 14px;border-radius:8px;margin-bottom:8px;list-style:none;line-height:1.5}
  .num{text-align:right}
  /* Research */
  .ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:16px}
  .idea-card{background:#f1efe8;border-radius:10px;padding:16px}
  .idea-card .ic-type{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .idea-card .ic-title{font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.3}
  .idea-card .ic-thesis{font-size:13px;color:#4a4a46;margin-bottom:8px;line-height:1.5}
  .idea-card .ic-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;font-size:12px;align-items:center}
  .ic-badge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500}
  .ic-catalyst{font-size:12px;color:#6b6a64;margin-top:5px}
  .ic-risk{font-size:12px;color:#a05a00;margin-top:3px}
  .conviction-dots{display:inline-flex;gap:3px;vertical-align:middle}
  .dot{width:8px;height:8px;border-radius:50%;background:#e1e0d9}
  .dot.on{background:#2a78d6}
  .scanner-tabs{display:flex;gap:8px;margin-bottom:12px}
  .tab-btn{padding:5px 14px;border-radius:20px;border:1.5px solid #e1e0d9;background:transparent;font-size:13px;cursor:pointer;color:#6b6a64;transition:all .15s}
  .tab-btn.active{background:#1a1a19;color:#fff;border-color:#1a1a19}
  .signal-acc{color:#0f6e56;font-weight:600}
  .signal-watch{color:#854f0b}
  .signal-avoid{color:#a33}
  .regime-g{color:#0f6e56;font-size:11px}
  .regime-d{color:#a33;font-size:11px}
  .tag{display:inline-block;padding:1px 7px;background:#e8e6df;border-radius:10px;font-size:11px;margin:2px 2px 0 0;color:#555}
  @media(prefers-color-scheme:dark){
    body{background:#1a1a19;color:#e9e8e3}.card,.idea-card{background:#262624}
    .card .l,.sub,th,.foot{color:#a3a29a}td,th,.foot{border-color:#2c2c2a}
    .idea-card .ic-thesis{color:#b0b0a8}
    .tab-btn{border-color:#3c3c38;color:#a3a29a}.tab-btn.active{background:#e9e8e3;color:#1a1a19;border-color:#e9e8e3}
    .dot{background:#3c3c38}.tag{background:#2c2c2a;color:#a3a29a}
    .ic-risk{color:#d4872a}
  }
  /* TOTP overlay */
  #auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:999}
  #auth-box{background:#fcfcfb;border-radius:16px;padding:32px 28px;width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}
  @media(prefers-color-scheme:dark){#auth-box{background:#262624;color:#e9e8e3}}
  #auth-box h2{margin:0 0 8px;font-size:20px}
  #auth-box p{color:#6b6a64;font-size:14px;margin:0 0 20px}
  #totp-input{width:100%;padding:12px;font-size:24px;letter-spacing:.25em;text-align:center;border:1.5px solid #e1e0d9;border-radius:10px;box-sizing:border-box;outline:none}
  #totp-input:focus{border-color:#1a1a19}
  #auth-err{color:#a33;font-size:13px;min-height:18px;margin:8px 0 0}
  #auth-btn{margin-top:14px;width:100%;padding:12px;background:#1a1a19;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
  @media(prefers-color-scheme:dark){#totp-input{background:#1a1a19;color:#e9e8e3;border-color:#3c3c38}#auth-btn{background:#e9e8e3;color:#1a1a19}}
</style>
</head>
<body>
<div id="auth-overlay">
  <div id="auth-box">
    <h2>🔐 Finance Dashboard</h2>
    <p>Enter the 6-digit code from your authenticator app</p>
    <input id="totp-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="000000" autocomplete="one-time-code">
    <div id="auth-err"></div>
    <button id="auth-btn">Unlock</button>
  </div>
</div>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const BASE_URL = "https://dovkpwqmhmweqhkpstdg.supabase.co/functions/v1/dashboard";
const DASH_KEY = "VSd6Ktn7bT9-v7xWhxUqew2FzC7uunO0I9xld6fZB9I";
const SESSION_KEY = "dash_auth";
const SESSION_TTL = 2 * 3600 * 1000; // 2 hours

const usd = n => "$" + Math.round(n).toLocaleString("en-US");
const pct = n => (n >= 0 ? "+" : "") + (n * 100).toFixed(1) + "%";
const dark = matchMedia("(prefers-color-scheme: dark)").matches;
const ink = dark ? "#c3c2b7" : "#52514e", grid = dark ? "#2c2c2a" : "#e1e0d9", surf = dark ? "#1a1a19" : "#fcfcfb";

function apiUrl(code) {
  return `${BASE_URL}?key=${DASH_KEY}&code=${code}`;
}

function getSession() {
  try {
    const s = JSON.parse(sessionStorage.getItem(SESSION_KEY) || "null");
    if (s && s.exp > Date.now()) return s.code;
  } catch {}
  return null;
}

function saveSession(code) {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({ code, exp: Date.now() + SESSION_TTL }));
}

function clearSession() {
  sessionStorage.removeItem(SESSION_KEY);
}

async function loadDashboard(code) {
  document.getElementById("app").innerHTML = "<p class='sub' style='padding:24px'>Loading live data…</p>";
  const r = await fetch(apiUrl(code));
  const data = await r.json();
  if (data.error === "totp" || data.error === "unauthorized") {
    clearSession();
    document.getElementById("auth-overlay").style.display = "flex";
    document.getElementById("app").innerHTML = "";
    document.getElementById("auth-err").textContent = "Invalid code — try again.";
    document.getElementById("totp-input").value = "";
    document.getElementById("totp-input").focus();
    return;
  }
  document.getElementById("auth-overlay").style.display = "none";
  saveSession(code);
  render(data);
}

// Auto-load if session still valid
const cached = getSession();
if (cached) {
  loadDashboard(cached);
} else {
  document.getElementById("auth-overlay").style.display = "flex";
  document.getElementById("totp-input").focus();
}

document.getElementById("auth-btn").addEventListener("click", () => {
  const code = document.getElementById("totp-input").value.trim();
  if (code.length !== 6) { document.getElementById("auth-err").textContent = "Enter a 6-digit code."; return; }
  document.getElementById("auth-err").textContent = "";
  loadDashboard(code);
});

document.getElementById("totp-input").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("auth-btn").click();
});

function signalBadge(s) {
  const m = {accumulate:['signal-acc','↑ Acumular'], watch:['signal-watch','◎ Observar'], avoid:['signal-avoid','✕ Evitar']};
  const [cls,lbl] = m[s] || ['','—'];
  return `<span class="${cls}">${lbl}</span>`;
}
function regimeBadge(r) {
  if (r === 'golden') return `<span class="regime-g">✦ Golden</span>`;
  if (r === 'death')  return `<span class="regime-d">✕ Death</span>`;
  return '<span style="color:#888;font-size:11px">—</span>';
}
function convictionDots(n) {
  return '<span class="conviction-dots">' + [1,2,3,4,5].map(i=>`<span class="dot${i<=n?' on':''}"></span>`).join('') + '</span>';
}
const typeColor = t => ({crypto:'#e34948',etf:'#2a78d6',stock:'#1baf7a',bond:'#eda100',macro:'#9a988f'})[t]||'#888';
const tfLabel = t => ({short:'⚡ Corto',mid:'◑ Mediano',long:'◉ Largo'})[t]||t;

function renderScannerTable(opps, filterType) {
  const rows = opps.filter(o => filterType === 'all' || o.type === filterType);
  if (!rows.length) return '<p class="sub" style="margin-top:8px">Sin datos. Corre market-research para poblar.</p>';
  return `<table><thead><tr>
    <th>Asset</th><th>Precio</th><th class="num">Score</th><th>Señal</th>
    <th class="num">vs SMA200</th><th class="num">vs Máx.</th><th class="num">RSI sem.</th><th>Régimen</th>
  </tr></thead><tbody>${rows.map(o=>`<tr>
    <td><b>${o.label}</b> <span style="color:#888;font-size:12px">${o.symbol}</span>${o.inPortfolio?' <span style="font-size:11px;padding:1px 6px;border-radius:8px;background:#2a78d620;color:#2a78d6">en portafolio</span>':''}</td>
    <td>${o.price>100?usd(o.price):'$'+Number(o.price).toFixed(3)}</td>
    <td class="num"><b>${o.score}</b></td>
    <td>${signalBadge(o.signal)}</td>
    <td class="num" style="color:${o.vsSma200Pct<0?'#0f6e56':'#a33'}">${o.vsSma200Pct!=null?(o.vsSma200Pct>=0?'+':'')+Number(o.vsSma200Pct).toFixed(0)+'%':'—'}</td>
    <td class="num" style="color:#854f0b">-${o.drawdownFromHighPct!=null?Number(o.drawdownFromHighPct).toFixed(0):'—'}%</td>
    <td class="num">${o.rsiWeekly!=null?Number(o.rsiWeekly).toFixed(0):'—'}</td>
    <td>${regimeBadge(o.regime)}</td>
  </tr>`).join('')}</tbody></table>`;
}

let _opps = [];
function switchTab(type) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === type));
  document.getElementById('scanner-table').innerHTML = renderScannerTable(_opps, type);
}

function render(d) {
  const toneBg = { warn: dark?"#3a2e12":"#faeeda", good: dark?"#0f2e26":"#e1f5ee", info: dark?"#262624":"#f1efe8" };
  const toneFg = { warn: dark?"#f0c46a":"#854f0b", good: dark?"#7fd9b8":"#0f6e56", info: dark?"#c3c2b7":"#444441" };
  const accRows = d.accounts.map(a=>`<tr><td>${a.name}</td><td class="num">${usd(a.value)}</td><td class="num" style="color:#888">${(a.value/d.netWorth*100).toFixed(1)}%</td></tr>`).join("");
  const alRows = d.allocation.map(r=>`<tr><td><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${r.color};margin-right:6px"></span>${r.label}</td><td class="num">${usd(r.value)}</td><td class="num">${(r.value/d.allocTotal*100).toFixed(1)}%</td><td class="num" style="color:#888">${r.assumed!=null?(r.assumed*100).toFixed(1)+"%":"—"}</td></tr>`).join("");
  const noteLis = d.notes.map(n=>`<li style="background:${toneBg[n.tone]};color:${toneFg[n.tone]}">${n.text}</li>`).join("");

  const research = d.research || { opportunities:[], ideas:[] };
  _opps = research.opportunities || [];
  const scanDate = research.scannedAt ? new Date(research.scannedAt).toLocaleString('es',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'America/Costa_Rica'}) : null;

  const ideasHtml = (research.ideas||[]).length
    ? research.ideas.map(idea=>`<div class="idea-card">
        <div class="ic-type" style="color:${typeColor(idea.type)}">${idea.type.toUpperCase()}${idea.symbol?' · '+idea.symbol:''}</div>
        <div class="ic-title">${idea.title}</div>
        <div class="ic-thesis">${idea.thesis}</div>
        <div class="ic-row">
          <span class="ic-badge" style="background:${typeColor(idea.type)}22;color:${typeColor(idea.type)}">${tfLabel(idea.timeframe)}</span>
          ${convictionDots(idea.conviction)}
        </div>
        ${idea.catalyst?`<div class="ic-catalyst">⚡ <b>Catalizador:</b> ${idea.catalyst}</div>`:''}
        ${idea.entryCriteria?`<div class="ic-catalyst">📍 <b>Entrada:</b> ${idea.entryCriteria}</div>`:''}
        ${idea.risk?`<div class="ic-risk">⚠ ${idea.risk}</div>`:''}
        <div style="margin-top:8px">${(idea.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>`).join('')
    : '<p class="sub" style="margin-top:8px">Ideas se generan los lunes automáticamente.</p>';

  document.getElementById("app").innerHTML = `
    <h1>Personal Finance</h1>
    <p class="sub">Live from Supabase · updated ${d.updated} · all values USD</p>
    <div class="cards">
      <div class="card"><div class="l">Net worth</div><div class="v">${usd(d.netWorth)}</div></div>
      <div class="card"><div class="l">Liquid (excl. property)</div><div class="v">${usd(d.liquid)}</div></div>
      <div class="card"><div class="l">1-yr projected (base)</div><div class="v">${usd(d.forecast.projBase[12])}</div></div>
      <div class="card"><div class="l">Expected return</div><div class="v">${pct(d.forecast.rBase)}</div></div>
    </div>
    <h2>1-year forecast</h2>
    <p class="sub">Expected total return weighted by your allocation. Band = low-to-high scenarios.</p>
    <div class="chartbox" style="height:280px"><canvas id="fc"></canvas></div>
    <h2>Accounts</h2>
    <table><thead><tr><th>Account</th><th class="num">Value</th><th class="num">Share</th></tr></thead><tbody>${accRows}<tr style="font-weight:600"><td>Total</td><td class="num">${usd(d.netWorth)}</td><td></td></tr></tbody></table>
    <h2>Allocation by asset class</h2>
    <div class="chartbox" style="height:90px"><canvas id="al"></canvas></div>
    <table style="margin-top:10px"><thead><tr><th>Class</th><th class="num">Value</th><th class="num">Share</th><th class="num">Assumed return</th></tr></thead><tbody>${alRows}</tbody></table>
    <h2>Prival custody — value history</h2>
    <p class="sub">The only source with months of data so far; the others build their trend going forward.</p>
    <div class="chartbox" style="height:240px"><canvas id="hist"></canvas></div>
    <h2>Analysis &amp; suggestions</h2>
    <ul>${noteLis}</ul>
    <h2>Investment research — ideas</h2>
    <p class="sub">Generated weekly by Claude Sonnet using scanner signals, macro context, and news sentiment. Outside your current portfolio — for research only, not advice.</p>
    <div class="ideas-grid">${ideasHtml}</div>
    <h2>Market scanner${scanDate?' <span style="font-size:13px;font-weight:400;color:#888">— actualizado '+scanDate+'</span>':''}</h2>
    <p class="sub">Score = RSI semanal (0–50) + distancia SMA200 (0–25) + drawdown desde máximo (0–20) × multiplicador golden/death cross.</p>
    <div class="scanner-tabs">
      <button class="tab-btn active" data-tab="all" onclick="switchTab('all')">Todo</button>
      <button class="tab-btn" data-tab="crypto" onclick="switchTab('crypto')">Crypto</button>
      <button class="tab-btn" data-tab="etf" onclick="switchTab('etf')">ETFs</button>
      <button class="tab-btn" data-tab="stock" onclick="switchTab('stock')">Acciones</button>
    </div>
    <div id="scanner-table">${renderScannerTable(_opps,'all')}</div>
    <p class="foot">Educational analysis from your own data — <b>not personalized financial advice</b>. Forecast uses transparent per-class return assumptions; actual returns vary and can be negative. Scanner scores are technical signals only. Confirm decisions with a licensed advisor.</p>`;

  const f = d.forecast;
  new Chart(document.getElementById("fc"),{type:"line",data:{labels:f.monthLabels,datasets:[
    {label:"High",data:f.projHigh,borderColor:"rgba(27,175,122,0.5)",borderWidth:1,pointRadius:0,fill:"+1",backgroundColor:"rgba(27,175,122,0.08)"},
    {label:"Base",data:f.projBase,borderColor:"#2a78d6",borderWidth:2,pointRadius:0,tension:0.1},
    {label:"Low",data:f.projLow,borderColor:"rgba(226,75,72,0.5)",borderWidth:1,pointRadius:0}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:"index"},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+": "+usd(c.parsed.y)}}},
      scales:{y:{ticks:{color:ink,callback:v=>"$"+Math.round(v/1000)+"k"},grid:{color:grid},border:{display:false}},x:{ticks:{color:ink},grid:{display:false}}}}});

  new Chart(document.getElementById("al"),{type:"bar",data:{labels:[""],datasets:d.allocation.map(r=>({label:r.label,data:[Math.round(r.value)],backgroundColor:r.color,borderColor:surf,borderWidth:2,borderRadius:3}))},
    options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,scales:{x:{stacked:true,display:false},y:{stacked:true,display:false}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+": "+usd(c.parsed.x)}}}}});

  const histData = d.historyByAccount?.prival_custody;
  new Chart(document.getElementById("hist"),{type:"line",data:{labels:histData?.labels??[],datasets:[{label:"Prival",data:histData?.data??[],borderColor:"#2a78d6",backgroundColor:"rgba(42,120,214,0.10)",borderWidth:2,fill:true,tension:0.25,pointRadius:2,pointBackgroundColor:"#2a78d6",pointBorderColor:surf,pointBorderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>usd(c.parsed.y)}}},
      scales:{y:{ticks:{color:ink,callback:v=>"$"+Math.round(v/1000)+"k"},grid:{color:grid},border:{display:false}},x:{ticks:{color:ink,maxRotation:45},grid:{display:false}}}}});
}
</script>
</body>
</html>
