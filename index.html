<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Dashboard</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;max-width:920px;margin:0 auto;padding:24px;color:#1a1a19;background:#fcfcfb;line-height:1.6}
  h1{font-size:24px;font-weight:600;margin:0 0 4px}h2{font-size:18px;font-weight:600;margin:28px 0 12px}
  .sub{color:#6b6a64;font-size:14px;margin:0 0 20px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:8px}
  .card{background:#f1efe8;border-radius:10px;padding:14px 16px}
  .card .l{font-size:13px;color:#6b6a64;margin-bottom:4px}.card .v{font-size:26px;font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:14px}
  td,th{padding:7px 4px;border-bottom:.5px solid #e1e0d9;text-align:left}th{color:#6b6a64;font-weight:500}
  .chartbox{position:relative;width:100%;margin:8px 0 4px}
  .foot{font-size:12px;color:#898781;margin-top:28px;border-top:.5px solid #e1e0d9;padding-top:14px}
  ul{padding:0;margin:0}
  li{padding:10px 14px;border-radius:8px;margin-bottom:8px;list-style:none;line-height:1.5}
  .num{text-align:right}
  button{font:inherit;padding:8px 14px;border-radius:8px;border:.5px solid #888;background:transparent;cursor:pointer}
  @media(prefers-color-scheme:dark){
    body{background:#1a1a19;color:#e9e8e3}.card{background:#262624}
    .card .l,.sub,th,.foot{color:#a3a29a}td,th,.foot{border-color:#2c2c2a}
  }
</style>
</head>
<body>
<div id="app"><p class="sub">Loading…</p></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const FN = "https://dovkpwqmhmweqhkpstdg.supabase.co/functions/v1/dashboard";
const usd = n => "$" + Math.round(n).toLocaleString("en-US");
const pct = n => (n >= 0 ? "+" : "") + (n * 100).toFixed(1) + "%";
const dark = matchMedia("(prefers-color-scheme: dark)").matches;
const ink = dark ? "#c3c2b7" : "#52514e", grid = dark ? "#2c2c2a" : "#e1e0d9", surf = dark ? "#1a1a19" : "#fcfcfb";

function getKey(force) {
  let k = force ? null : localStorage.getItem("dashKey");
  if (!k) { k = prompt("Enter your dashboard key:"); if (k) localStorage.setItem("dashKey", k.trim()); }
  return k ? k.trim() : null;
}

function load(force) {
  const key = getKey(force);
  if (!key) { document.getElementById("app").innerHTML = "<h1>Locked</h1><p class='sub'>A key is required.</p><button onclick='load(true)'>Enter key</button>"; return; }
  document.getElementById("app").innerHTML = "<p class='sub'>Loading live data…</p>";
  fetch(FN + "?key=" + encodeURIComponent(key)).then(r => {
    if (r.status === 401) { localStorage.removeItem("dashKey"); throw new Error("Wrong key"); }
    return r.json();
  }).then(render).catch(e => {
    document.getElementById("app").innerHTML = "<h1>Couldn't load</h1><p class='sub'>" + e.message + "</p><button onclick='load(true)'>Re-enter key</button>";
  });
}
load(false);

function render(d) {
  const toneBg = { warn: dark ? "#3a2e12" : "#faeeda", good: dark ? "#0f2e26" : "#e1f5ee", info: dark ? "#262624" : "#f1efe8" };
  const toneFg = { warn: dark ? "#f0c46a" : "#854f0b", good: dark ? "#7fd9b8" : "#0f6e56", info: dark ? "#c3c2b7" : "#444441" };
  const accRows = d.accounts.map(a => `<tr><td>${a.name}</td><td class="num">${usd(a.value)}</td><td class="num" style="color:#888">${(a.value/d.netWorth*100).toFixed(1)}%</td></tr>`).join("");
  const alRows = d.allocation.map(r => `<tr><td><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${r.color};margin-right:6px"></span>${r.label}</td><td class="num">${usd(r.value)}</td><td class="num">${(r.value/d.allocTotal*100).toFixed(1)}%</td><td class="num" style="color:#888">${r.assumed!=null?(r.assumed*100).toFixed(1)+"%":"—"}</td></tr>`).join("");
  const noteLis = d.notes.map(n => `<li style="background:${toneBg[n.tone]};color:${toneFg[n.tone]}">${n.text}</li>`).join("");

  document.getElementById("app").innerHTML = `
    <h1>Personal Finance</h1>
    <p class="sub">Live from Supabase · updated ${d.updated} · all values USD</p>
    <div class="cards">
      <div class="card"><div class="l">Net worth</div><div class="v">${usd(d.netWorth)}</div></div>
      <div class="card"><div class="l">Liquid (excl. property)</div><div class="v">${usd(d.liquid)}</div></div>
      <div class="card"><div class="l">1-yr projected (base)</div><div class="v">${usd(d.forecast.projBase[12])}</div></div>
      <div class="card"><div class="l">Expected return</div><div class="v">${pct(d.forecast.rBase)}</div></div>
    </div>
    <h2>1-year forecast</h2>
    <p class="sub">Expected total return weighted by your allocation. Band = low-to-high scenarios. Estimates, not guarantees — returns can be negative.</p>
    <div class="chartbox" style="height:280px"><canvas id="fc"></canvas></div>
    <h2>Accounts</h2>
    <table><thead><tr><th>Account</th><th class="num">Value</th><th class="num">Share</th></tr></thead><tbody>${accRows}<tr style="font-weight:600"><td>Total</td><td class="num">${usd(d.netWorth)}</td><td></td></tr></tbody></table>
    <h2>Allocation by asset class</h2>
    <div class="chartbox" style="height:90px"><canvas id="al"></canvas></div>
    <table style="margin-top:10px"><thead><tr><th>Class</th><th class="num">Value</th><th class="num">Share</th><th class="num">Assumed return</th></tr></thead><tbody>${alRows}</tbody></table>
    <h2>Prival custody — value history</h2>
    <p class="sub">The only source with months of data so far; the others build their trend going forward.</p>
    <div class="chartbox" style="height:240px"><canvas id="hist"></canvas></div>
    <h2>Analysis &amp; suggestions</h2>
    <ul>${noteLis}</ul>
    <p class="foot">Educational analysis from your own data — <b>not personalized financial advice</b>. Forecast uses transparent per-class return assumptions (see allocation table) and assumes the allocation stays roughly constant; actual returns vary and can be negative. Confirm decisions with a licensed advisor.</p>`;

  const f = d.forecast;
  new Chart(document.getElementById("fc"), { type: "line",
    data: { labels: f.monthLabels, datasets: [
      { label:"High", data:f.projHigh, borderColor:"rgba(27,175,122,0.5)", borderWidth:1, pointRadius:0, fill:"+1", backgroundColor:"rgba(27,175,122,0.08)" },
      { label:"Base", data:f.projBase, borderColor:"#2a78d6", borderWidth:2, pointRadius:0, tension:0.1 },
      { label:"Low", data:f.projLow, borderColor:"rgba(226,75,72,0.5)", borderWidth:1, pointRadius:0 } ] },
    options: { responsive:true, maintainAspectRatio:false, interaction:{intersect:false,mode:"index"},
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>c.dataset.label+": "+usd(c.parsed.y)}} },
      scales:{ y:{ticks:{color:ink,callback:v=>"$"+Math.round(v/1000)+"k"},grid:{color:grid},border:{display:false}}, x:{ticks:{color:ink},grid:{display:false}} } } });

  new Chart(document.getElementById("al"), { type: "bar",
    data: { labels:[""], datasets: d.allocation.map(r => ({ label:r.label, data:[Math.round(r.value)], backgroundColor:r.color, borderColor:surf, borderWidth:2, borderRadius:3 })) },
    options: { indexAxis:"y", responsive:true, maintainAspectRatio:false, scales:{x:{stacked:true,display:false},y:{stacked:true,display:false}},
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>c.dataset.label+": "+usd(c.parsed.x)}} } } });

  new Chart(document.getElementById("hist"), { type: "line",
    data: { labels:d.privalHistory.labels, datasets:[{ label:"Prival", data:d.privalHistory.data, borderColor:"#2a78d6", backgroundColor:"rgba(42,120,214,0.10)", borderWidth:2, fill:true, tension:0.25, pointRadius:2, pointBackgroundColor:"#2a78d6", pointBorderColor:surf, pointBorderWidth:2 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>usd(c.parsed.y)}}},
      scales:{ y:{ticks:{color:ink,callback:v=>"$"+Math.round(v/1000)+"k"},grid:{color:grid},border:{display:false}}, x:{ticks:{color:ink,maxRotation:45},grid:{display:false}} } } });
}
</script>
</body>
</html>
