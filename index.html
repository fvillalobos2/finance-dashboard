<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<title>Finance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f6f4; --surface:#fff; --surface-2:#fafaf8; --text:#16161a; --muted:#74736c;
    --line:#eceae6; --accent:#2a78d6; --accent-soft:#eaf2fc;
    --good:#0f8a5f; --good-bg:#e6f6ee; --warn:#9a6a12; --warn-bg:#fbf0db; --shadow:0 1px 2px rgba(20,20,20,.05),0 2px 8px rgba(20,20,20,.04);
    --r:16px; --r-sm:10px;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#101010; --surface:#1a1a19; --surface-2:#201f1e; --text:#ededea; --muted:#9a988f;
    --line:#2a2a27; --accent:#5aa0ef; --accent-soft:#16273b;
    --good:#54c79a; --good-bg:#10241c; --warn:#e0b057; --warn-bg:#2a2110; --shadow:none;
  }}
  *{box-sizing:border-box}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;margin:0;background:var(--bg);color:var(--text);
    line-height:1.55;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums}
  .wrap{max-width:940px;margin:0 auto;padding:20px 18px 60px}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  h2{font-size:15px;font-weight:600;letter-spacing:.01em;margin:30px 4px 12px;color:var(--text)}
  a{color:var(--accent);text-decoration:none}

  .topbar{display:flex;align-items:center;gap:10px;padding:6px 4px 18px}
  .topbar .logo{width:30px;height:30px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
  .topbar h1{font-size:18px;font-weight:600;margin:0;flex:1}
  .pill{font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--good);background:var(--good-bg);padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
  .pill .dot{width:6px;height:6px;border-radius:50%;background:var(--good)}
  .ghost{font-size:13px;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:8px;padding:5px 10px;cursor:pointer}
  .ghost:hover{border-color:var(--muted)}

  .hero{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:22px 24px;margin-bottom:14px}
  .hero .lab{font-size:13px;color:var(--muted);margin-bottom:2px}
  .hero .big{font-size:42px;font-weight:700;letter-spacing:-.02em;line-height:1.1}
  .hero .strip{display:flex;flex-wrap:wrap;gap:22px;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
  .hero .strip div span{display:block}
  .hero .strip .k{font-size:12px;color:var(--muted)}
  .hero .strip .v{font-size:18px;font-weight:600;margin-top:1px}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 18px}
  .card .l{font-size:12.5px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .tcard{cursor:pointer;transition:border-color .12s,transform .08s}
  .tcard:hover{border-color:var(--accent)}
  .tcard:active{transform:scale(.99)}
  .card .v{font-size:24px;font-weight:600;letter-spacing:-.01em}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 20px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{font-size:12px;font-weight:500;color:var(--muted);text-align:left;padding:0 4px 8px}
  td{padding:10px 4px;border-top:1px solid var(--line)}
  tbody tr:first-child td{border-top:none}
  .acc{cursor:pointer;transition:color .12s}.acc:hover{color:var(--accent)}
  .acc td:first-child{font-weight:500}
  .chev{display:inline-block;width:14px;color:var(--muted);transition:transform .15s}
  .drill td{background:var(--surface-2);font-size:13px;color:var(--muted);padding:0}
  .drill .inner{padding:8px 14px;display:grid;gap:6px}
  .drill .hrow{display:flex;justify-content:space-between;gap:12px}

  .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:18px;margin-bottom:6px}
  .controls .lab{font-size:12.5px;color:var(--muted);margin-bottom:7px;display:flex;justify-content:space-between}
  .controls .val{font-weight:600;color:var(--text)}
  input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:5px;background:var(--line);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:3px}
  .seg button{font:inherit;font-size:13px;padding:5px 12px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--accent);color:#fff;font-weight:500}
  .switch{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
  select{font:inherit;font-size:14px;padding:8px 12px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2);color:var(--text);cursor:pointer}
  select:focus{outline:none;border-color:var(--accent)}

  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:12px;font-size:12.5px;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:6px}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
  .chartbox{position:relative;width:100%}

  .notes{display:grid;gap:10px}
  .note{display:flex;gap:11px;padding:13px 15px;border-radius:var(--r-sm);font-size:13.5px;line-height:1.5;border:1px solid transparent}
  .note.info{background:var(--surface);border-color:var(--line);color:var(--text)}
  .note.warn{background:var(--warn-bg);color:var(--warn)}
  .note.good{background:var(--good-bg);color:var(--good)}
  .note .ic{flex:none;font-weight:700}
  .sug{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;background:var(--surface);box-shadow:var(--shadow)}
  .sug h4{margin:0 0 5px;font-size:14px;font-weight:600;display:flex;align-items:center}
  .sug p{margin:0;font-size:13.5px;color:var(--muted);line-height:1.55}
  .sug .badge{font-size:10.5px;font-weight:600;letter-spacing:.02em;padding:3px 9px;border-radius:20px;margin-right:9px;text-transform:uppercase}

  .foot{font-size:12px;color:var(--muted);margin-top:26px;padding-top:16px;border-top:1px solid var(--line)}
  [title]{cursor:help}
  .hlp{border-bottom:1px dotted var(--muted)}
  .hlp::after{content:"\00a0ⓘ";font-size:10px;opacity:.55}

  .chat{display:flex;flex-direction:column;gap:8px;max-height:360px;overflow-y:auto;margin-bottom:12px}
  .chat:empty{display:none}
  .msg{padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.5;max-width:88%;word-wrap:break-word}
  .msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
  .msg.ai{align-self:flex-start;background:var(--surface-2);border:1px solid var(--line);border-bottom-left-radius:4px}
  .msg.loading{opacity:.6}
  .msg p{margin:0 0 7px}.msg p:last-child{margin-bottom:0}
  .msg ul{margin:5px 0;padding-left:18px}.msg li{margin:3px 0}
  .msg strong{font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .chips button{font:inherit;font-size:12.5px;padding:6px 11px;border:1px solid var(--line);border-radius:20px;background:var(--surface-2);color:var(--text);cursor:pointer}
  .chips button:hover{border-color:var(--accent);color:var(--accent)}
  .chatbar{display:flex;gap:8px}
  .chatbar input{flex:1;min-width:0;font:inherit;padding:10px 13px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2);color:var(--text)}
  .chatbar input:focus{outline:none;border-color:var(--accent)}
  .chatbar button{font:inherit;font-weight:600;padding:10px 18px;border:none;border-radius:var(--r-sm);background:var(--accent);color:#fff;cursor:pointer}
  @media(max-width:600px){
    .wrap{padding:14px 12px 56px}
    h2{margin:24px 2px 10px;font-size:14.5px}
    .hero{padding:18px 16px}
    .hero .big{font-size:32px}
    .hero .strip{gap:14px}
    .panel{padding:14px 13px}
    table{font-size:12.5px}
    td,th{padding:8px 3px}
    .msg{max-width:92%}
    .chips button{font-size:12px;padding:6px 10px}
    .login{margin:5vh auto 0;padding:24px 20px}
  }
  .login{max-width:380px;margin:9vh auto 0;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:28px 26px}
  .login h1{font-size:20px;margin:14px 0 4px}.login p{color:var(--muted);font-size:13.5px;margin:0 0 20px}
  .login label{font-size:12.5px;color:var(--muted);display:block;margin:14px 0 6px}
  .login input{width:100%;font:inherit;padding:11px 13px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2);color:var(--text)}
  .login input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .login button{width:100%;margin-top:20px;font:inherit;font-weight:600;padding:12px;border:none;border-radius:var(--r-sm);background:var(--accent);color:#fff;cursor:pointer}
  .login button:hover{filter:brightness(1.05)}
  .err{color:#d9534f;font-size:13px;margin-top:12px;min-height:16px}
  .lg-logo{width:42px;height:42px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px}
  .skel{height:14px;border-radius:6px;background:linear-gradient(90deg,var(--line),var(--surface-2),var(--line));background-size:200% 100%;animation:sh 1.2s infinite}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const FN = "https://dovkpwqmhmweqhkpstdg.supabase.co/functions/v1/dashboard";
const FN_ASK = "https://dovkpwqmhmweqhkpstdg.supabase.co/functions/v1/ask";
const usd = n => "$" + Math.round(n).toLocaleString("en-US");
const usdc = n => Math.abs(n) >= 1000 ? "$" + (n/1000).toFixed(1) + "k" : "$" + Math.round(n);
const pct = n => (n >= 0 ? "+" : "") + (n * 100).toFixed(1) + "%";
const dark = matchMedia("(prefers-color-scheme: dark)").matches;
const ink = dark ? "#9a988f" : "#74736c", grid = dark ? "#2a2a27" : "#eceae6", surf = dark ? "#1a1a19" : "#fff";
let DATA = null, fcChart = null, perfChart = null, state = null, SESSION = null;

function unlock(msg) {
  document.getElementById("app").innerHTML = `
    <div class="login">
      <div class="lg-logo">₡</div>
      <h1>Personal Finance</h1>
      <p>Two-factor sign in.</p>
      <label>Dashboard key</label><input type="password" id="k" placeholder="••••••••" autocomplete="off">
      <label>Google Authenticator code</label><input type="text" id="c" inputmode="numeric" maxlength="6" placeholder="6-digit code" autocomplete="off">
      <button onclick="go()">Unlock</button>
      <div class="err" id="err">${msg || ""}</div>
    </div>`;
  const saved = localStorage.getItem("dashKey"); if (saved) document.getElementById("k").value = saved;
  (saved ? document.getElementById("c") : document.getElementById("k")).focus();
  document.getElementById("c").addEventListener("keydown", e => { if (e.key === "Enter") go(); });
}
function go() {
  const key = document.getElementById("k").value.trim(), code = document.getElementById("c").value.trim();
  if (!key) return; localStorage.setItem("dashKey", key);
  document.getElementById("app").innerHTML = `<div class="topbar"><div class="logo">₡</div><h1>Personal Finance</h1></div>
    <div class="hero"><div class="lab">Net worth</div><div class="skel" style="width:50%;height:38px;margin:6px 0"></div><div class="skel" style="width:80%;margin-top:14px"></div></div>`;
  fetch(FN + "?key=" + encodeURIComponent(key) + "&code=" + encodeURIComponent(code)).then(r => {
    if (r.status === 401) return r.json().then(j => { throw new Error(j.error === "totp" ? "Wrong or expired code — enter the current one." : "Wrong key."); });
    return r.json();
  }).then(d => { DATA = d; SESSION = d.session; renderDash(); }).catch(e => unlock(e.message));
}
unlock();

function start() { return state.includeProp ? DATA.netWorth : DATA.liquid; }
function scenario(rate, n) {
  const m = Math.pow(1 + rate, 1 / 12) - 1, out = [];
  for (let t = 0; t <= n; t++) {
    const g = start() * Math.pow(1 + m, t);
    const cFV = m === 0 ? state.contrib * t : state.contrib * ((Math.pow(1 + m, t) - 1) / m);
    out.push(Math.round(g + cFV));
  }
  return out;
}
function drawForecast() {
  const n = state.horizon * 12;
  const labels = Array.from({ length: n + 1 }, (_, t) => t === 0 ? "now" : (t % 12 === 0 ? (state.horizon <= 1 ? "+" + t + "mo" : "Yr " + (t / 12)) : ""));
  const band = r => { const m = Math.pow(1 + r, 1 / 12) - 1; return Array.from({ length: n + 1 }, (_, t) => Math.round(start() * Math.pow(1 + m, t))); };
  const mine = scenario(state.annual, n);
  document.getElementById("projOut").textContent = usd(mine[n]);
  const gain = mine[n] - start();
  document.getElementById("gainOut").textContent = (gain >= 0 ? "+" : "−") + usd(Math.abs(gain)).slice(1) + " over " + state.horizon + "y";
  document.getElementById("gainOut").style.color = gain >= 0 ? "var(--good)" : "#d9534f";
  if (fcChart) fcChart.destroy();
  fcChart = new Chart(document.getElementById("fc"), { type: "line",
    data: { labels, datasets: [
      { data: band(DATA.forecast.rHigh), borderColor: "transparent", pointRadius: 0, fill: "+1", backgroundColor: dark ? "rgba(90,160,239,.10)" : "rgba(42,120,214,.07)" },
      { data: band(DATA.forecast.rLow), borderColor: "transparent", pointRadius: 0 },
      { label: "scenario", data: mine, borderColor: "#2a78d6", borderWidth: 2.5, pointRadius: 0, tension: .15,
        pointHoverRadius: 4, pointHoverBackgroundColor: "#2a78d6" },
      { label: "goal " + (DATA.goal.low*100).toFixed(0) + "%", data: band(DATA.goal.low), borderColor: dark ? "#a3a29a" : "#74736c", borderDash: [5, 4], borderWidth: 1.5, pointRadius: 0 } ] },
    options: { responsive: true, maintainAspectRatio: false, interaction: { intersect: false, mode: "index" },
      plugins: { legend: { display: false }, tooltip: { displayColors: false, callbacks: { title: c => c[0].label || "", label: c => usd(c.parsed.y) } } },
      scales: { y: { ticks: { color: ink, maxTicksLimit: 5, callback: v => usdc(v) }, grid: { color: grid }, border: { display: false } },
        x: { ticks: { color: ink, autoSkip: false, maxRotation: 0 }, grid: { display: false }, border: { color: grid } } } } });
}
function setHorizon(h) { state.horizon = h; document.querySelectorAll(".seg button").forEach(b => b.classList.toggle("on", +b.dataset.h === h)); drawForecast(); }
function toggleDrill(slug) {
  const ex = document.getElementById("d-" + slug), ch = document.getElementById("ch-" + slug);
  if (ex) { ex.remove(); ch.style.transform = ""; return; }
  ch.style.transform = "rotate(90deg)";
  const hs = (DATA.holdingsByAccount[slug] || []).slice(0, 14);
  const tr = document.createElement("tr"); tr.id = "d-" + slug; tr.className = "drill";
  tr.innerHTML = `<td colspan="3"><div class="inner">${hs.map(h => { const g = h.cost != null && h.cost > 0 ? (h.value - h.cost) / h.cost * 100 : null; return `<div class="hrow"><span>${h.description}</span><span class="num">${usd(h.value)}${g != null ? ` <span style="color:${g>=0?'var(--good)':'#d9534f'}">${g>=0?'+':''}${g.toFixed(0)}%</span>` : ""}</span></div>`; }).join("") || "no line items"}</div></td>`;
  document.getElementById("row-" + slug).after(tr);
}
function drawPerf(slug) {
  const h = DATA.historyByAccount[slug];
  const box = document.getElementById("perfStat"), note = document.getElementById("perfNote");
  if (perfChart) perfChart.destroy();
  if (!h || !h.data.length) { box.innerHTML = ""; note.textContent = "No history yet."; return; }
  const first = h.data[0], last = h.data[h.data.length - 1], chg = last - first, chgPct = first ? chg / first * 100 : 0;
  box.innerHTML = `<span>Start <b style="color:var(--text)">${usd(first)}</b></span><span>Latest <b style="color:var(--text)">${usd(last)}</b></span><span style="color:${chg>=0?'var(--good)':'#d9534f'}">Change ${chg>=0?'+':'−'}${usd(Math.abs(chg)).slice(1)} (${chgPct>=0?'+':''}${chgPct.toFixed(1)}%)</span>`;
  note.textContent = h.data.length < 2
    ? "Tracking just started — daily history builds from here."
    : `${h.data.length} data points · ${h.labels[0]} → ${h.labels[h.labels.length-1]} · value change includes deposits/withdrawals, not pure return (true return view is the next build).`;
  perfChart = new Chart(document.getElementById("perf"), { type: "line",
    data: { labels: h.labels, datasets: [{ data: h.data, borderColor: "#2a78d6", backgroundColor: dark ? "rgba(90,160,239,.10)" : "rgba(42,120,214,.08)", borderWidth: 2, fill: true, tension: .3, pointRadius: h.data.length > 40 ? 0 : 2.5, pointHoverRadius: 4, pointHoverBackgroundColor: "#2a78d6" }] },
    options: { responsive: true, maintainAspectRatio: false, interaction: { intersect: false, mode: "index" },
      plugins: { legend: { display: false }, tooltip: { displayColors: false, callbacks: { label: c => usd(c.parsed.y) } } },
      scales: { y: { ticks: { color: ink, maxTicksLimit: 5, callback: v => usdc(v) }, grid: { color: grid }, border: { display: false } }, x: { ticks: { color: ink, maxRotation: 0, autoSkip: true, maxTicksLimit: 7 }, grid: { display: false }, border: { color: grid } } } } });
}

function md(t) {
  const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const inline = s => esc(s).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/(^|[^*])\*([^*]+?)\*/g, "$1<em>$2</em>");
  let html = "", inList = false;
  for (const raw of String(t).split(/\r?\n/)) {
    let line = raw.trim();
    if (!line) { if (inList) { html += "</ul>"; inList = false; } continue; }
    line = line.replace(/^#{1,6}\s*/, "");
    if (/^\|.*\|/.test(line)) line = line.replace(/\|/g, " · ").replace(/^ · | · $/g, "").trim();
    if (/^[-*•]\s+/.test(line)) { if (!inList) { html += "<ul>"; inList = true; } html += "<li>" + inline(line.replace(/^[-*•]\s+/, "")) + "</li>"; }
    else { if (inList) { html += "</ul>"; inList = false; } html += "<p>" + inline(line) + "</p>"; }
  }
  if (inList) html += "</ul>";
  return html;
}
function addMsg(role, text) {
  const c = document.getElementById("chat"); if (!c) return null;
  const d = document.createElement("div"); d.className = "msg " + role;
  d.innerHTML = md(text);
  c.appendChild(d); c.scrollTop = c.scrollHeight; return d;
}
function askChip(q) { const i = document.getElementById("q"); if (i) { i.value = q; askAI(); } }
async function askAI() {
  const inp = document.getElementById("q"); if (!inp) return;
  const q = inp.value.trim(); if (!q) return;
  inp.value = ""; addMsg("user", q);
  const t = addMsg("ai", "…"); t.classList.add("loading");
  try {
    const r = await fetch(FN_ASK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ question: q, session: SESSION }) });
    const j = await r.json();
    t.classList.remove("loading");
    if (r.status === 401) { t.innerHTML = "Session expired — tap Lock and sign in again."; return; }
    t.innerHTML = md(j.answer || j.error || "No answer.");
  } catch (e) { t.classList.remove("loading"); t.innerHTML = "Error: " + e.message; }
}

function selectProfile(i) {
  const t = DATA.targets[i]; if (!t) return;
  const inv = DATA.investable;
  const cur = {}; (DATA.allocation || []).forEach(r => cur[r.category] = r.value);
  const labels = { bond: "Bonds", equity: "Equity", fund: "Funds", cash: "Cash", crypto: "Crypto" };
  let rows = "";
  for (const k of ["bond", "equity", "fund", "cash", "crypto"]) {
    const wt = t.weights[k] || 0, now = Math.round(cur[k] || 0), target = Math.round(wt * inv), delta = target - now;
    if (Math.abs(delta) < 500 && now === 0 && wt === 0) continue;
    rows += `<tr><td>${labels[k]}</td><td class="num">${usd(now)}</td><td class="num">${usd(target)}</td><td class="num" style="color:${delta>=0?'var(--good)':'#d9534f'}">${delta>=0?"+":"−"}${usd(Math.abs(delta)).slice(1)}</td></tr>`;
  }
  const head = document.getElementById("movesHead"); if (head) head.textContent = `Moves to reach ${t.name} (~${pct(t.expectedReturn)}/yr)`;
  const body = document.getElementById("movesBody"); if (body) body.innerHTML = rows || '<tr><td colspan="4" style="color:var(--muted)">Already near this target.</td></tr>';
  DATA.targets.forEach((_, idx) => { const c = document.getElementById("tcard-" + idx); if (c) c.style.border = idx === i ? "2px solid var(--accent)" : "1px solid var(--line)"; });
}

function renderDash() {
  const d = DATA;
  state = { horizon: 1, contrib: 0, annual: d.forecast.rBase, includeProp: true };
  const icon = { info: "i", warn: "!", good: "✓" };
  const accRows = d.accounts.map(a => `<tr class="acc" id="row-${a.slug}" onclick="toggleDrill('${a.slug}')"><td><span class="chev" id="ch-${a.slug}">›</span> ${a.name}</td><td class="num">${usd(a.value)}</td><td class="num" style="color:var(--muted)">${(a.value/d.netWorth*100).toFixed(1)}%</td></tr>`).join("");
  const alRows = d.allocation.map(r => `<tr><td><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${r.color};margin-right:8px"></span>${r.label}</td><td class="num">${usd(r.value)}</td><td class="num">${(r.value/d.allocTotal*100).toFixed(1)}%</td><td class="num" style="color:var(--muted)">${r.assumed!=null?(r.assumed*100).toFixed(1)+"%":"—"}</td></tr>`).join("");
  const legend = d.allocation.map(r => `<span><i style="background:${r.color}"></i>${r.label} ${(r.value/d.allocTotal*100).toFixed(0)}%</span>`).join("");
  const notes = d.notes.map(n => `<div class="note ${n.tone}"><span class="ic">${icon[n.tone]}</span><span>${n.text}</span></div>`).join("");
  const gc = v => v >= 0 ? "var(--good)" : "#d9534f";
  const perf = d.performance || [];
  const perfRows = perf.map(p => `<tr><td>${p.description} <span style="color:var(--muted);font-size:12px">${p.account}</span></td><td class="num">${usd(p.value)}</td><td class="num" style="color:${gc(p.gainPct)}">${p.gainPct>=0?"+":""}${p.gainPct.toFixed(1)}%</td><td class="num" style="color:${gc(p.gainUsd)}">${p.gainUsd>=0?"+":"−"}${usd(Math.abs(p.gainUsd)).slice(1)}</td></tr>`).join("");
  const bBg = { high: dark?"#3a2e12":"#faeeda", med: dark?"#16273b":"#eaf2fc", low: dark?"#262624":"#f1efe8" };
  const bFg = { high: dark?"#f0c46a":"#854f0b", med: dark?"#7fb2ef":"#185fa5", low: dark?"#a3a29a":"#5f5e5a" };
  const bL = { high: "Priority", med: "Consider", low: "Optional" };
  const sugHtml = (d.suggestions || []).map(s => `<div class="sug"><h4><span class="badge" style="background:${bBg[s.p]};color:${bFg[s.p]}">${bL[s.p]}</span>${s.t}</h4><p>${s.d}</p></div>`).join("");
  const tgts = d.targets || [];
  const tCards = tgts.map((t, i) => `<div class="card tcard" id="tcard-${i}" onclick="selectProfile(${i})"${t.recommended?' style="border:2px solid var(--accent)"':""}><div class="l">${t.name}${t.recommended?" ★":""}</div><div class="v" style="color:var(--good)">${pct(t.expectedReturn)}</div><div style="font-size:12px;color:var(--muted);margin-top:4px">${Math.round(t.weights.equity*100)}% eq · ${Math.round(t.weights.bond*100)}% bd · ${Math.round((t.weights.crypto||0)*100)}% cr</div></div>`).join("");
  const moves = (d.goalMoves || []).map(m => `<tr><td>${m.class}</td><td class="num">${usd(m.current)}</td><td class="num">${usd(m.target)}</td><td class="num" style="color:${m.delta>=0?'var(--good)':'#d9534f'}">${m.delta>=0?"+":"−"}${usd(Math.abs(m.delta)).slice(1)}</td></tr>`).join("");
  const recT = tgts.find(t => t.recommended) || tgts[tgts.length-1] || {name:"",expectedReturn:0};
  const recExp = pct(recT.expectedReturn), recName = recT.name;
  const goalTxt = `${(d.goal.low*100).toFixed(0)}–${(d.goal.high*100).toFixed(0)}%`;
  const rcell = v => v == null ? '<span style="color:var(--muted)">—</span>' : `<span style="color:${v>=0?'var(--good)':'#d9534f'}">${v>=0?"+":""}${v.toFixed(1)}%</span>`;
  const retRows = Object.values(d.accountReturns || {}).map(r => `<tr><td>${r.name}</td><td class="num">${rcell(r.m1)}</td><td class="num">${rcell(r.m6)}</td><td class="num">${rcell(r.ytd)}</td><td class="num">${rcell(r.y1)}</td></tr>`).join("");

  document.getElementById("app").innerHTML = `
    <div class="topbar">
      <div class="logo">₡</div><h1>Personal Finance</h1>
      <span class="pill"><span class="dot"></span>LIVE</span>
      <button class="ghost" onclick="localStorage.removeItem('dashKey');location.reload()">Lock</button>
    </div>
    <div class="hero">
      <div class="lab hlp" title="Everything you own across all accounts (Prival, IBKR, Binance, property), valued in USD.">Total net worth · ${d.updated}</div>
      <div class="big">${usd(d.netWorth)}</div>
      <div class="strip">
        <div><span class="k hlp" title="Net worth minus the Providencia property — money you could access relatively quickly.">Liquid (excl. property)</span><span class="v">${usd(d.liquid)}</span></div>
        <div><span class="k hlp" title="Weighted average of the per-asset-class return assumptions vs your ${goalTxt} goal. An estimate, not a guarantee.">Expected return · goal ${goalTxt}</span><span class="v" style="color:${d.goal.onTrack?'var(--good)':'#d9534f'}">${pct(d.forecast.rBase)}/yr</span></div>
        <div><span class="k">Accounts</span><span class="v">${d.accounts.length}</span></div>
      </div>
    </div>
    <div class="cards">
      <div class="card"><div class="l hlp" title="Projected value at your chosen horizon, given the contribution and return sliders below.">Projected (scenario)</div><div class="v" id="projOut">—</div></div>
      <div class="card"><div class="l hlp" title="Projected value minus today's base amount — the modeled gain over the horizon (excludes your contributions counted as principal).">Projected gain</div><div class="v" id="gainOut" style="font-size:19px">—</div></div>
      <div class="card"><div class="l hlp" title="Largest asset class as a share of total holdings.">Top class</div><div class="v" style="font-size:19px">${d.allocation[0].label} ${(d.allocation[0].value/d.allocTotal*100).toFixed(0)}%</div></div>
    </div>

    <h2>Ask AI <span style="color:var(--muted);font-weight:400">· your portfolio analyst</span></h2>
    <div class="panel">
      <div id="chat" class="chat"></div>
      <div class="chips">
        <button onclick="askChip('Am I on track for my 7-10% goal, and what should I change to get there?')">On track for goal?</button>
        <button onclick="askChip('Which of my holdings should I review or consider exiting, and why?')">What to review?</button>
        <button onclick="askChip('How concentrated is my portfolio and what are the biggest risks?')">Concentration risk?</button>
        <button onclick="askChip('If I add $1,000 today toward my goal, where should it go?')">Where to add $1,000?</button>
      </div>
      <div class="chatbar"><input id="q" placeholder="Ask about your portfolio…" onkeydown="if(event.key==='Enter')askAI()"><button onclick="askAI()">Send</button></div>
      <p class="sub" style="margin:10px 2px 0">Reads your live data. Educational analysis, not licensed advice.</p>
    </div>

    <h2>What-if forecast</h2>
    <div class="panel">
      <div class="controls">
        <div><div class="lab"><span>Horizon</span></div><div class="seg"><button data-h="1" onclick="setHorizon(1)">1y</button><button data-h="3" onclick="setHorizon(3)">3y</button><button data-h="5" onclick="setHorizon(5)">5y</button><button data-h="10" onclick="setHorizon(10)">10y</button></div></div>
        <div><div class="lab"><span>Monthly contribution</span><span class="val" id="cOut">$0</span></div><input type="range" id="cIn" min="0" max="5000" step="50" value="0"></div>
        <div><div class="lab"><span>Annual return</span><span class="val" id="rOut">${pct(d.forecast.rBase)}</span></div><input type="range" id="rIn" min="-10" max="20" step="0.5" value="${(d.forecast.rBase*100).toFixed(1)}"></div>
        <div><div class="lab"><span>Base amount</span></div><label class="switch"><input type="checkbox" id="pIn" checked> Include property</label></div>
      </div>
      <p class="lab" style="margin:4px 0 10px;color:var(--muted)">Shaded band = model low-to-high · blue = your scenario · dashed = your ${goalTxt} goal. Estimates, not guarantees.</p>
      <div class="chartbox" style="height:270px"><canvas id="fc"></canvas></div>
    </div>

    <h2>Accounts <span style="color:var(--muted);font-weight:400">· tap for holdings</span></h2>
    <div class="panel"><table><thead><tr><th>Account</th><th class="num">Value</th><th class="num">Share</th></tr></thead><tbody>${accRows}</tbody></table></div>

    <h2>Allocation by asset class</h2>
    <div class="panel">
      <div class="legend">${legend}</div>
      <div class="chartbox" style="height:64px"><canvas id="al"></canvas></div>
      <table style="margin-top:14px"><thead><tr><th>Class</th><th class="num">Value</th><th class="num">Share</th><th class="num"><span class="hlp" title="The annual return this asset class is assumed to earn, used to build the forecast. Conservative, editable estimates.">Assumed return</span></th></tr></thead><tbody>${alRows}</tbody></table>
    </div>

    <h2>Path to your ${goalTxt} goal</h2>
    <div class="panel">
      <p class="sub">Current mix models <b>${pct(d.forecast.rBase)}</b>/yr ${d.goal.onTrack ? "— within goal ✓" : `— below your ${(d.goal.low*100).toFixed(0)}% floor`}. Profiles rebalance your ${usd(d.investable)} investable (property fixed). <b>${recName} ★</b> is the lowest-risk mix that reaches the goal (~${recExp}).</p>
      <div class="cards">${tCards}</div>
      <h4 id="movesHead" style="margin:20px 0 8px;font-size:14px;font-weight:600">Moves to reach ${recName} (~${recExp}/yr)</h4>
      <table><thead><tr><th>Asset class</th><th class="num">Now</th><th class="num">Target</th><th class="num">Change</th></tr></thead><tbody id="movesBody">${moves || '<tr><td colspan="4" style="color:var(--muted)">Already near target.</td></tr>'}</tbody></table>
      <p class="sub" style="margin-top:10px">The 9–10% top end would need a much heavier crypto/concentrated tilt — far more risk, not something to count on. Shift <b>gradually</b> via contributions + idle cash to avoid market-timing, and mind taxes when selling winners.</p>
    </div>

    <h2>Account performance over time</h2>
    <div class="panel">
      <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:14px">
        <select id="accSel"></select>
        <div id="perfStat" class="legend" style="margin:0"></div>
      </div>
      <div class="chartbox" style="height:240px"><canvas id="perf"></canvas></div>
      <p class="lab" id="perfNote" style="color:var(--muted);margin:10px 2px 0"></p>
    </div>

    <h2>Returns by account <span style="color:var(--muted);font-weight:400">· value change</span></h2>
    <div class="panel">
      <table><thead><tr><th>Account</th><th class="num">1mo</th><th class="num">6mo</th><th class="num">YTD</th><th class="num">1yr</th></tr></thead><tbody>${retRows || '<tr><td colspan="5" style="color:var(--muted)">Building history…</td></tr>'}</tbody></table>
      <p class="sub" style="margin-top:10px">Value change per period (— = not enough history yet). Includes any deposits/withdrawals, so it approximates return. Exact per-holding return-since-purchase is in Holdings performance below.</p>
    </div>

    <h2>Holdings performance <span style="color:var(--muted);font-weight:400">· gain since purchase</span></h2>
    <div class="panel"><table><thead><tr><th>Holding</th><th class="num">Value</th><th class="num">Gain %</th><th class="num">Gain $</th></tr></thead><tbody>${perfRows || '<tr><td colspan="4" style="color:var(--muted)">No cost-basis data yet (IBKR populated; Prival fills in next statement).</td></tr>'}</tbody></table></div>

    <h2>Portfolio suggestions <span style="color:var(--muted);font-weight:400">· from your holdings</span></h2>
    ${sugHtml || '<p class="sub">No suggestions right now.</p>'}

    <h2>Snapshot</h2>
    <div class="notes">${notes}</div>

    <p class="foot">Educational analysis from your own data — <b>not personalized financial advice</b>. Forecast uses transparent per-class return assumptions and your inputs; actual returns vary and can be negative.</p>`;

  document.getElementById("cIn").addEventListener("input", e => { state.contrib = +e.target.value; document.getElementById("cOut").textContent = usd(state.contrib); drawForecast(); });
  document.getElementById("rIn").addEventListener("input", e => { state.annual = +e.target.value / 100; document.getElementById("rOut").textContent = pct(state.annual); drawForecast(); });
  document.getElementById("pIn").addEventListener("change", e => { state.includeProp = e.target.checked; drawForecast(); });
  setHorizon(1);

  new Chart(document.getElementById("al"), { type: "bar",
    data: { labels: [""], datasets: d.allocation.map(r => ({ label: r.label, data: [Math.round(r.value)], backgroundColor: r.color, borderColor: surf, borderWidth: 2, borderRadius: 4 })) },
    options: { indexAxis: "y", responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true, display: false }, y: { stacked: true, display: false } },
      plugins: { legend: { display: false }, tooltip: { displayColors: false, callbacks: { label: c => c.dataset.label + ": " + usd(c.parsed.x) } } } } });
  const histAccs = d.accounts.filter(a => d.historyByAccount[a.slug]).sort((a, b) => d.historyByAccount[b.slug].data.length - d.historyByAccount[a.slug].data.length);
  const sel = document.getElementById("accSel");
  sel.innerHTML = histAccs.map(a => `<option value="${a.slug}">${a.name} · ${d.historyByAccount[a.slug].data.length} pt${d.historyByAccount[a.slug].data.length > 1 ? "s" : ""}</option>`).join("");
  sel.addEventListener("change", e => drawPerf(e.target.value));
  if (histAccs.length) drawPerf(histAccs[0].slug);
}
</script>
</body>
</html>
