<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Dashboard</title>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;max-width:960px;margin:0 auto;padding:16px;color:#1a1a19;background:#fcfcfb;line-height:1.6}
  h1{font-size:22px;font-weight:600;margin:0 0 4px}h2{font-size:16px;font-weight:600;margin:24px 0 10px}
  .sub{color:#6b6a64;font-size:13px;margin:0 0 16px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:8px}
  .card{background:#f1efe8;border-radius:10px;padding:12px 14px}
  .card .l{font-size:12px;color:#6b6a64;margin-bottom:2px}.card .v{font-size:22px;font-weight:600;line-height:1.2}
  .card .sub2{font-size:11px;color:#6b6a64;margin-top:2px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td,th{padding:6px 4px;border-bottom:.5px solid #e1e0d9;text-align:left}th{color:#6b6a64;font-weight:500;font-size:12px}
  .chartbox{position:relative;width:100%;margin:6px 0 4px}
  .foot{font-size:11px;color:#898781;margin-top:24px;border-top:.5px solid #e1e0d9;padding-top:12px}
  ul{padding:0;margin:0}
  li{padding:10px 12px;border-radius:8px;margin-bottom:8px;list-style:none;line-height:1.5;font-size:13px}
  .num{text-align:right}
  .pos{color:#0f6e56}.neg{color:#a33}
  /* Crypto section */
  .orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:8px}
  .order-pill{padding:8px 12px;border-radius:8px;font-size:12px;line-height:1.4}
  .order-pill.buy{background:#e1f5ee;color:#0f6e56}
  .order-pill.sell{background:#faeeda;color:#854f0b}
  .order-pill .op-sym{font-weight:700;font-size:13px}
  .order-pill .op-px{font-size:14px;font-weight:600}
  /* Research */
  .ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:14px}
  .idea-card{background:#f1efe8;border-radius:10px;padding:14px}
  .idea-card .ic-type{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .idea-card .ic-title{font-size:14px;font-weight:600;margin-bottom:5px;line-height:1.3}
  .idea-card .ic-thesis{font-size:12px;color:#4a4a46;margin-bottom:7px;line-height:1.5}
  .idea-card .ic-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px;font-size:11px;align-items:center}
  .ic-badge{padding:2px 7px;border-radius:12px;font-size:11px;font-weight:500}
  .ic-catalyst{font-size:11px;color:#6b6a64;margin-top:4px}
  .ic-risk{font-size:11px;color:#a05a00;margin-top:3px}
  .conviction-dots{display:inline-flex;gap:3px;vertical-align:middle}
  .dot{width:7px;height:7px;border-radius:50%;background:#e1e0d9}
  .dot.on{background:#2a78d6}
  .scanner-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .tab-btn{padding:4px 12px;border-radius:20px;border:1.5px solid #e1e0d9;background:transparent;font-size:12px;cursor:pointer;color:#6b6a64;transition:all .15s}
  .tab-btn.active{background:#1a1a19;color:#fff;border-color:#1a1a19}
  .signal-acc{color:#0f6e56;font-weight:600}
  .signal-watch{color:#854f0b}
  .signal-avoid{color:#a33}
  .regime-g{color:#0f6e56;font-size:11px}
  .regime-d{color:#a33;font-size:11px}
  .tag{display:inline-block;padding:1px 6px;background:#e8e6df;border-radius:10px;font-size:10px;margin:2px 2px 0 0;color:#555}
  /* Mobile overrides */
  @media(max-width:600px){
    body{padding:10px;overflow-x:hidden}
    .card{padding:12px 10px}
    .num-big{font-size:26px!important}
    h2{font-size:15px}
    .ideas-grid{grid-template-columns:1fr}
    .orders-grid{grid-template-columns:repeat(2,1fr)}
    table{font-size:12px}
    td,th{padding:4px 3px}
    .chartbox{max-height:160px!important}
    .chartbox canvas{touch-action:none}
    .page-tabs{overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:2px}
    .ptab{flex-shrink:0}
    #chat-panel{width:calc(100vw - 20px)!important;right:10px!important;bottom:56px!important;max-height:65vh}
    #chat-btn{right:10px!important;bottom:10px!important;width:44px!important;height:44px!important;font-size:20px!important}
    #ichat-input{font-size:16px}
  }
  @media(prefers-color-scheme:dark){
    body{background:#1a1a19;color:#e9e8e3}.card,.idea-card{background:#262624}
    .card .l,.sub,.sub2,th,.foot{color:#a3a29a}td,th,.foot{border-color:#2c2c2a}
    .idea-card .ic-thesis{color:#b0b0a8}
    .tab-btn{border-color:#3c3c38;color:#a3a29a}.tab-btn.active{background:#e9e8e3;color:#1a1a19;border-color:#e9e8e3}
    .dot{background:#3c3c38}.tag{background:#2c2c2a;color:#a3a29a}
    .ic-risk{color:#d4872a}
    .order-pill.buy{background:#0f2e26;color:#7fd9b8}
    .order-pill.sell{background:#3a2e12;color:#f0c46a}
  }
  /* Page-level tab nav */
  .page-tabs{display:flex;gap:0;border-bottom:1.5px solid #e1e0d9;margin:12px 0 20px}
  .ptab{padding:9px 18px;background:transparent;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;font-size:14px;font-weight:500;cursor:pointer;color:#6b6a64;transition:all .15s}
  .ptab.active{color:#1a1a19;border-bottom-color:#1a1a19}
  /* Strategy / DCA tab */
  .coin-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:12px;margin:12px 0}
  .coin-card{background:#f1efe8;border-radius:12px;padding:14px 16px}
  .coin-card h3{font-size:15px;font-weight:600;margin:0 0 3px}
  .cc-sub{font-size:12px;color:#6b6a64;margin-bottom:10px}
  .cc-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:.5px solid #e1e0d9}
  .cc-row:last-child{border:none;padding-bottom:0}
  .cc-label{color:#6b6a64}.cc-val{font-weight:500;text-align:right}
  .tp-badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:11px;font-weight:600;margin-left:5px}
  .tp-has{background:#e1f5ee;color:#0f6e56}.tp-no{background:#e8e6df;color:#888}
  .cycle-bar{background:#f1efe8;border-radius:10px;padding:12px 14px;margin:0 0 16px}
  .cycle-track{height:8px;background:#e1e0d9;border-radius:4px;position:relative;margin:8px 0 4px}
  .cycle-fill{height:100%;border-radius:4px}
  .cycle-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;background:#1a1a19;border:2.5px solid #fcfcfb;border-radius:50%}
  /* Hover tooltips */
  [data-tip]{position:relative;cursor:help;border-bottom:1px dotted currentColor}
  [data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a19;color:#e9e8e3;font-size:11px;line-height:1.45;padding:6px 9px;border-radius:7px;width:max-content;max-width:210px;white-space:normal;text-align:left;z-index:200;opacity:0;pointer-events:none;transition:opacity .15s;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  [data-tip]:hover::after{opacity:1}
  @media(prefers-color-scheme:dark){[data-tip]::after{background:#e9e8e3;color:#1a1a19}}
  @media(max-width:600px){[data-tip]::after{left:0;transform:none;max-width:180px}}
  @media(prefers-color-scheme:dark){
    .ptab{color:#a3a29a}.ptab.active{color:#e9e8e3;border-bottom-color:#e9e8e3}.page-tabs{border-color:#2c2c2a}
    .coin-card{background:#262624}.cc-row{border-color:#2c2c2a}.tp-no{background:#2c2c2a}
    .cycle-bar{background:#262624}.cycle-track{background:#2c2c2a}.cycle-dot{background:#e9e8e3;border-color:#1a1a19}
  }
  @media(max-width:600px){.coin-cards{grid-template-columns:1fr}.ptab{padding:8px 12px;font-size:13px}}
  /* TOTP overlay */
  #auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:999}
  #auth-box{background:#fcfcfb;border-radius:16px;padding:28px 24px;width:min(320px,90vw);text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}
  @media(prefers-color-scheme:dark){#auth-box{background:#262624;color:#e9e8e3}}
  #auth-box h2{margin:0 0 8px;font-size:18px}
  #auth-box p{color:#6b6a64;font-size:13px;margin:0 0 16px}
  #totp-input{width:100%;padding:11px;font-size:22px;letter-spacing:.25em;text-align:center;border:1.5px solid #e1e0d9;border-radius:10px;box-sizing:border-box;outline:none}
  #totp-input:focus{border-color:#1a1a19}
  #auth-err{color:#a33;font-size:12px;min-height:16px;margin:6px 0 0}
  #auth-btn{margin-top:12px;width:100%;padding:11px;background:#1a1a19;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
  @media(prefers-color-scheme:dark){#totp-input{background:#1a1a19;color:#e9e8e3;border-color:#3c3c38}#auth-btn{background:#e9e8e3;color:#1a1a19}}
/* Chat */
#chat-btn{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:#1a1a19;color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.22);z-index:200;display:none;align-items:center;justify-content:center}
@media(prefers-color-scheme:dark){#chat-btn{background:#e9e8e3;color:#1a1a19}}
#chat-panel{position:fixed;bottom:80px;right:20px;width:min(380px,calc(100vw - 32px));background:#fcfcfb;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:200;display:none;flex-direction:column;overflow:hidden}
@media(prefers-color-scheme:dark){#chat-panel{background:#262624;color:#e9e8e3}}
#chat-header{padding:12px 16px;border-bottom:.5px solid #e1e0d9;font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
@media(prefers-color-scheme:dark){#chat-header{border-bottom-color:#3c3c38}}
#chat-msgs{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;max-height:320px;min-height:80px}
.cm-user{align-self:flex-end;background:#1a1a19;color:#fff;border-radius:12px 12px 2px 12px;padding:8px 12px;font-size:13px;max-width:80%;line-height:1.5;word-break:break-word}
.cm-ai{align-self:flex-start;background:#f1efe8;color:#1a1a19;border-radius:2px 12px 12px 12px;padding:8px 12px;font-size:13px;max-width:90%;line-height:1.5;white-space:pre-wrap;word-break:break-word}
@media(prefers-color-scheme:dark){.cm-user{background:#e9e8e3;color:#1a1a19}.cm-ai{background:#2c2c2a;color:#e9e8e3}}
.cm-thinking{color:#888;font-size:12px;font-style:italic;align-self:flex-start;padding:2px 0}
#chat-input-row{display:flex;gap:6px;padding:10px 12px;border-top:.5px solid #e1e0d9}
@media(prefers-color-scheme:dark){#chat-input-row{border-top-color:#3c3c38}}
#chat-input{flex:1;border:1.5px solid #e1e0d9;border-radius:10px;padding:8px 10px;font-size:13px;outline:none;background:transparent;color:inherit;font-family:inherit}
#chat-input:focus{border-color:#1a1a19}
@media(prefers-color-scheme:dark){#chat-input{border-color:#3c3c38}#chat-input:focus{border-color:#e9e8e3}}
#chat-send{padding:8px 14px;background:#1a1a19;color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
#chat-send:disabled{opacity:.5;cursor:default}
@media(prefers-color-scheme:dark){#chat-send{background:#e9e8e3;color:#1a1a19}}
</style>
</head>
<body>
<div id="auth-overlay">
  <div id="auth-box">
    <h2>🔐 Finance Dashboard</h2>
    <p>Enter the 6-digit code from your authenticator app</p>
    <input id="totp-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="000000" autocomplete="one-time-code">
    <div id="auth-err"></div>
    <button id="auth-btn">Unlock</button>
  </div>
</div>
<div id="app"></div>
<button id="chat-btn" onclick="toggleChat()">💬</button>
<div id="chat-panel">
  <div id="chat-header">Ask your portfolio AI <button onclick="toggleChat()" style="background:none;border:none;cursor:pointer;font-size:16px;color:inherit;padding:0;line-height:1">✕</button></div>
  <div id="chat-msgs"></div>
  <div id="chat-input-row">
    <input id="chat-input" type="text" placeholder="Net worth? How am I vs SPY?">
    <button id="chat-send" onclick="sendChat()">Send</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const BASE_URL = "https://dovkpwqmhmweqhkpstdg.supabase.co/functions/v1/dashboard";
const DASH_KEY = "VSd6Ktn7bT9-v7xWhxUqew2FzC7uunO0I9xld6fZB9I";
const SESSION_KEY = "dash_auth";
const SESSION_TTL = 2 * 3600 * 1000;

const usd = n => "$" + Math.round(n).toLocaleString("en-US");
const pct = n => (n >= 0 ? "+" : "") + (n * 100).toFixed(1) + "%";
const pctN = n => (n >= 0 ? "+" : "") + n.toFixed(1) + "%";
const dark = matchMedia("(prefers-color-scheme: dark)").matches;
const ink = dark ? "#c3c2b7" : "#52514e", grid = dark ? "#2c2c2a" : "#e1e0d9", surf = dark ? "#1a1a19" : "#fcfcfb";

function apiUrl(code) { return `${BASE_URL}?key=${DASH_KEY}&code=${code}`; }

function getSession() {
  try { const s = JSON.parse(sessionStorage.getItem(SESSION_KEY) || "null"); if (s && s.exp > Date.now()) return s.code; } catch {}
  return null;
}
function saveSession(code) { sessionStorage.setItem(SESSION_KEY, JSON.stringify({ code, exp: Date.now() + SESSION_TTL })); }
function clearSession() { sessionStorage.removeItem(SESSION_KEY); }

async function loadDashboard(code, silent = false) {
  if (!silent) document.getElementById("app").innerHTML = "<p class='sub' style='padding:20px'>Loading…</p>";
  if (!silent) document.getElementById("auth-overlay").style.display = "none";
  if (silent) { _charts.forEach(c => { try { c.destroy(); } catch {} }); _charts = []; _cycleChartInited = false; }
  // Fetch dashboard + Fear & Greed in parallel
  const halvingTs = Math.floor(new Date('2024-04-19').getTime() / 1000);
  const nowTs = Math.floor(Date.now() / 1000);
  const [r, fgR, cgR, btcHistR] = await Promise.all([
    fetch(apiUrl(code)),
    fetch("https://api.alternative.me/fng/?limit=1").catch(() => null),
    fetch("https://api.coingecko.com/api/v3/global").catch(() => null),
    fetch(`https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=820&interval=daily`).catch(() => null),
  ]);
  const data = await r.json();
  if (data.error === "totp" || data.error === "unauthorized") {
    clearSession(); document.getElementById("auth-overlay").style.display = "flex";
    document.getElementById("app").innerHTML = "";
    document.getElementById("auth-err").textContent = "Invalid code — try again.";
    document.getElementById("totp-input").value = ""; document.getElementById("totp-input").focus();
    return;
  }
  document.getElementById("auth-overlay").style.display = "none";
  saveSession(code);
  if (data.session) _session = data.session;
  let fg = null, btcDom = null;
  if (fgR && fgR.ok) { try { const j = await fgR.json(); fg = j?.data?.[0] ? { value: Number(j.data[0].value), label: j.data[0].value_classification } : null; } catch {} }
  if (cgR && cgR.ok) { try { const j = await cgR.json(); btcDom = j?.data?.market_cap_percentage?.btc ?? null; } catch {} }
  if (btcHistR && btcHistR.ok) { try { _btcHistory = await btcHistR.json(); } catch {} }
  _cycleChartInited = false;
  render(data, fg, btcDom);
  document.getElementById("chat-btn").style.display = "flex";
  clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = setInterval(() => { const c = getSession(); if (c) loadDashboard(c, true); }, 5 * 60 * 1000);
}

const cached = getSession();
if (cached) loadDashboard(cached);
else { document.getElementById("auth-overlay").style.display = "flex"; document.getElementById("totp-input").focus(); }

document.getElementById("auth-btn").addEventListener("click", async () => {
  const code = document.getElementById("totp-input").value.trim();
  const btn = document.getElementById("auth-btn");
  const err = document.getElementById("auth-err");
  if (code.length !== 6) { err.textContent = "Enter a 6-digit code."; return; }
  err.textContent = ""; btn.textContent = "Loading…"; btn.disabled = true;
  try {
    await loadDashboard(code);
  } catch (e) {
    document.getElementById("auth-overlay").style.display = "flex";
    document.getElementById("app").innerHTML = "";
    err.textContent = "Error: " + e.message;
  } finally {
    btn.textContent = "Unlock"; btn.disabled = false;
  }
});
document.getElementById("totp-input").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("auth-btn").click(); });

function fgColor(v) {
  if (v <= 25) return "#e34948"; if (v <= 45) return "#e67e22"; if (v <= 55) return "#888"; if (v <= 75) return "#1baf7a"; return "#0f6e56";
}

function signalBadge(s) {
  const m = {accumulate:['signal-acc','↑ Acumular'], watch:['signal-watch','◎ Observar'], avoid:['signal-avoid','✕ Evitar']};
  const [cls,lbl] = m[s] || ['','—']; return `<span class="${cls}">${lbl}</span>`;
}
function regimeBadge(r) {
  const gt = 'SMA50 > SMA200 — tendencia alcista. El score se multiplica ×1.2.';
  const dt = 'SMA50 < SMA200 — tendencia bajista. El score se multiplica ×0.6.';
  if (r === 'golden') return `<span class="regime-g" data-tip="${gt}">✦ Golden</span>`;
  if (r === 'death')  return `<span class="regime-d" data-tip="${dt}">✕ Death</span>`;
  return '<span style="color:#888;font-size:11px">—</span>';
}
function convictionDots(n) {
  return '<span class="conviction-dots">' + [1,2,3,4,5].map(i=>`<span class="dot${i<=n?' on':''}"></span>`).join('') + '</span>';
}
const typeColor = t => ({crypto:'#e34948',etf:'#2a78d6',stock:'#1baf7a',bond:'#eda100',macro:'#9a988f'})[t]||'#888';
const tfLabel = t => ({short:'⚡ Corto',mid:'◑ Mediano',long:'◉ Largo'})[t]||t;

function fmtPrice(p) {
  if (!p || Number(p) === 0) return '—';
  const n = Number(p);
  return n >= 100 ? usd(n) : '$' + n.toFixed(n >= 1 ? 3 : 6);
}
function renderScannerTable(opps, filterType) {
  const rows = opps.filter(o => filterType === 'all' || o.type === filterType);
  if (!rows.length) return '<p class="sub" style="margin-top:8px">Sin datos para este filtro. Corre market-research para poblar.</p>';
  return `<div style="overflow-x:auto"><table><thead><tr>
    <th>Asset</th><th>Precio</th><th class="num">Score</th><th>Señal</th>
    <th class="num">SMA200</th><th class="num">Draw.</th><th class="num">RSI</th><th>Régimen</th>
  </tr></thead><tbody>${rows.map(o=>`<tr>
    <td><b>${o.label}</b> <span style="color:#888;font-size:11px">${o.symbol}</span>${o.inPortfolio?' <span style="font-size:10px;padding:1px 5px;border-radius:8px;background:#2a78d620;color:#2a78d6">portafolio</span>':''}</td>
    <td>${fmtPrice(o.price)}</td>
    <td class="num"><b>${o.score}</b></td>
    <td>${signalBadge(o.signal)}</td>
    <td class="num" style="color:${o.vsSma200Pct<0?'#0f6e56':'#a33'}">${o.vsSma200Pct!=null?(o.vsSma200Pct>=0?'+':'')+Number(o.vsSma200Pct).toFixed(0)+'%':'—'}</td>
    <td class="num" style="color:#854f0b">${o.drawdownFromHighPct!=null?'-'+Number(o.drawdownFromHighPct).toFixed(0)+'%':'—'}</td>
    <td class="num">${o.rsiWeekly!=null?Number(o.rsiWeekly).toFixed(0):'—'}</td>
    <td>${regimeBadge(o.regime)}</td>
  </tr>`).join('')}</tbody></table></div>`;
}

function renderIbkr(holdings, total) {
  if (!holdings || !holdings.length) return '<p class="sub">Sin posiciones IBKR registradas.</p>';
  const positions = holdings.filter(h => h.category !== 'cash').sort((a,b) => b.value - a.value);
  const cash = holdings.find(h => h.category === 'cash');
  const totalVal = total || holdings.reduce((s,h) => s + h.value, 0);

  let totalCost = 0, totalCur = 0;
  const rows = positions.map(h => {
    const pct2 = (h.value / totalVal * 100).toFixed(1);
    let pnlHtml = '—';
    if (h.cost && h.cost > 0) {
      const p = (h.value - h.cost) / h.cost * 100;
      pnlHtml = `<span class="${p>=0?'pos':'neg'}">${p>=0?'+':''}${p.toFixed(1)}%</span>`;
      totalCost += h.cost; totalCur += h.value;
    }
    const name = (h.description || '').slice(0, 22);
    return `<tr><td><b>${name}</b></td><td class="num">${usd(h.value)}</td><td class="num" style="color:#888">${pct2}%</td><td class="num">${pnlHtml}</td></tr>`;
  }).join('');

function renderPrival(holdings, total) {

  const catColor = { bond:'#2a78d6', fund:'#eda100', cash:'#4a3aa7' };
  let rows = '', totalCost = 0, totalCur = 0;
  for (const cat of catOrder) {
    for (const h of holdings.filter(h => h.category === cat)) {
      const pct = (h.value / totalVal * 100).toFixed(1);
      let pnlHtml = '—';
      if (h.cost !== null && h.cost > 0) {
        const g = h.gainPct;
        pnlHtml = `<span class="${g>=0?'pos':'neg'}">${g>=0?'+':''}${g.toFixed(1)}%</span>`;
        totalCost += h.cost; totalCur += h.value;

      rows += `<tr><td>${badge}<span style="font-size:12px">${name}</span></td><td class="num">${usd(h.value)}</td><td class="num" style="color:#888">${pct}%</td><td class="num">${pnlHtml}</td></tr>`;
    }
  }
  const totalPnl = totalCost > 0
    ? `<tr style="font-weight:600"><td>Total</td><td class="num">${usd(totalCur)}</td><td></td><td class="num"><span class="${totalCur>=totalCost?'pos':'neg'}">${totalCur>=totalCost?'+':''}${((totalCur-totalCost)/totalCost*100).toFixed(1)}%</span></td></tr>`

function halvingPhaseJS() {
  const m = Math.floor((Date.now() - new Date('2024-04-19').getTime()) / (30*86400000));
  if (m < 6)  return {month:m, total:48, phase:'Post-halving', color:'#2a78d6', tp1:1.35, tp2:2.50};
  if (m < 18) return {month:m, total:48, phase:'Bull run',     color:'#1baf7a', tp1:1.40, tp2:2.80};
  if (m < 30) return {month:m, total:48, phase:'Distribución', color:'#e8a030', tp1:1.30, tp2:2.00};
  if (m < 42) return {month:m, total:48, phase:'Bear market',  color:'#e24848', tp1:1.20, tp2:1.70};
  return          {month:m%48, total:48, phase:'Pre-halving',  color:'#8b5cf6', tp1:1.25, tp2:2.00};
}

function renderCycleChart() {
  const canvas = document.getElementById('cycle-chart');
  if (!canvas) return;
  const halvingMs = new Date('2024-04-19').getTime();
  const cycleEndMs = halvingMs + 48 * 30 * 86400000;
  const nowMs = Date.now();

  const phases = [
    { start: 0,  end: 6,  color: 'rgba(42,120,214,0.13)',  label: 'Post-halving' },
    { start: 6,  end: 18, color: 'rgba(27,175,122,0.13)',  label: 'Bull run' },
    { start: 18, end: 30, color: 'rgba(232,160,48,0.13)',  label: 'Distribución' },
    { start: 30, end: 42, color: 'rgba(226,72,72,0.13)',   label: 'Bear market' },
    { start: 42, end: 48, color: 'rgba(139,92,246,0.13)',  label: 'Pre-halving' },
  ];

  const pts = _btcHistory?.prices ?? [];
  const dataset = pts.filter(([ts])=>ts>=halvingMs).map(([ts,px])=>({x:ts,y:px}));

  const phasePlugin = {
    id: 'phaseZones',
    beforeDatasetsDraw(chart) {
      const { ctx, chartArea: {left,right,top,bottom}, scales: {x,y} } = chart;
      for (const ph of phases) {
        const x0 = Math.max(x.getPixelForValue(halvingMs + ph.start*30*86400000), left);
        const x1 = Math.min(x.getPixelForValue(halvingMs + ph.end  *30*86400000), right);
        if (x1 <= x0) continue;
        ctx.fillStyle = ph.color;
        ctx.fillRect(x0, top, x1-x0, bottom-top);
        // Phase label at top
        ctx.fillStyle = dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.3)';
        ctx.font = '9px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(ph.label, x0+(x1-x0)/2, top+10);
      }
      // "Ahora" dashed line
      const xNow = x.getPixelForValue(nowMs);
      if (xNow >= left && xNow <= right) {
        ctx.strokeStyle = dark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.4)';
        ctx.lineWidth = 1.5; ctx.setLineDash([4,3]);
        ctx.beginPath(); ctx.moveTo(xNow,top+14); ctx.lineTo(xNow,bottom); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = dark ? '#e9e8e3' : '#1a1a19';
        ctx.font = 'bold 9px system-ui'; ctx.textAlign = 'center';
        ctx.fillText('▼ ahora', xNow, top+22);
      }
    }
  };

  try {
    _charts.push(new Chart(canvas, {
      type: 'line',
      plugins: [phasePlugin],
      data: { datasets: [{
        data: dataset,
        borderColor: '#f7931a',
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.2,
        fill: false,
      }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: {
            title: items => new Date(items[0].parsed.x).toLocaleDateString('es',{month:'short',day:'numeric',year:'numeric'}),
            label: c => 'BTC $'+Math.round(c.parsed.y).toLocaleString('en-US'),
          }}
        },
        scales: {
          x: {
            type: 'linear', min: halvingMs, max: cycleEndMs,
            ticks: { color: ink, maxTicksLimit: 6, callback: v => {
              const m = Math.round((v-halvingMs)/(30*86400000));
              if (m%6!==0) return '';
              return new Date(halvingMs+m*30*86400000).toLocaleDateString('es',{month:'short',year:'2-digit'});
            }},
            grid: { display: false }
          },
          y: {
            suggestedMin: 20000, suggestedMax: 120000,
            ticks: { color: ink, maxTicksLimit: 4, callback: v => '$'+Math.round(v/1000)+'k' },
            grid: { color: grid }, border: { display: false }
          }
        }
      }
    }));
  } catch(e) { console.error('cycle chart error:', e); }
}

// ── Chat ──────────────────────────────────────────────────────────────────────
const ASK_URL = "https://dovkpwqmhmweqhkpstdg.supabase.co/functions/v1/ask";

function toggleChat() {
  const p = document.getElementById("chat-panel");
  const open = p.style.display === "flex";
  p.style.display = open ? "none" : "flex";
  if (!open) document.getElementById("chat-input").focus();
}

async function sendChat() {
  const input = document.getElementById("chat-input");
  const msgs = document.getElementById("chat-msgs");
  const send = document.getElementById("chat-send");
  const question = input.value.trim();
  if (!question || !_session) return;
  input.value = "";
  send.disabled = true;

  const userEl = document.createElement("div");
  userEl.className = "cm-user";
  userEl.textContent = question;
  msgs.appendChild(userEl);

  const thinkEl = document.createElement("div");
  thinkEl.className = "cm-thinking";
  thinkEl.textContent = "Thinking…";
  msgs.appendChild(thinkEl);
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const res = await fetch(ASK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, session: _session }),
    });
    const data = await res.json();
    thinkEl.remove();
    const aiEl = document.createElement("div");
    aiEl.className = "cm-ai";
    aiEl.textContent = data.answer || data.error || "No response.";
    msgs.appendChild(aiEl);
  } catch (e) {
    thinkEl.className = "cm-ai";
    thinkEl.textContent = "Error: " + e.message;
  }
  msgs.scrollTop = msgs.scrollHeight;
  send.disabled = false;
}

document.getElementById("chat-input").addEventListener("keydown", e => {
  if (e.key === "Enter") sendChat();
});

async function sendInlineChat() {
  const input = document.getElementById("ichat-input");
  const msgs = document.getElementById("ichat-msgs");
  if (!input || !msgs) return;
  const question = input.value.trim();
  if (!question || !_session) { if (!_session) alert("Cargando sesión, intenta en un momento."); return; }
  input.value = "";

  const userEl = document.createElement("div");
  userEl.className = "cm-user";
  userEl.textContent = question;
  msgs.appendChild(userEl);

  const thinkEl = document.createElement("div");
  thinkEl.className = "cm-thinking";
  thinkEl.textContent = "Thinking…";
  msgs.appendChild(thinkEl);
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const res = await fetch(ASK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, session: _session }),
    });
    const data = await res.json();
    thinkEl.remove();
    const aiEl = document.createElement("div");
    aiEl.className = "cm-ai";
    aiEl.textContent = data.answer || data.error || "No response.";
    msgs.appendChild(aiEl);
  } catch (e) {
    thinkEl.className = "cm-ai";
    thinkEl.textContent = "Error: " + e.message;
  }
  msgs.scrollTop = msgs.scrollHeight;
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter" && document.activeElement?.id === "ichat-input") sendInlineChat();
});
